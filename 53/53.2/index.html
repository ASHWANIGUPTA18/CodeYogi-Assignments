<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Responsive Hero</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">
	<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-10 py-8 sm:py-12 lg:py-16">
		<section class="flex flex-col-reverse lg:flex-row items-center gap-8 lg:gap-12">
			<div class="w-full lg:w-1/2 text-center lg:text-left space-y-6 sm:space-y-8">
				<h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold leading-tight text-black">
					Data to enrich your
					<span class="block text-purple-700">online business</span>
				</h1>
				<p class="text-lg sm:text-xl text-gray-600 leading-relaxed max-w-xl mx-auto lg:mx-0">
					Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s.
				</p>
				<div class="flex flex-col sm:flex-row justify-center lg:justify-start gap-3 sm:gap-4">
					<button class="w-full sm:w-auto px-6 sm:px-7 py-3 rounded-md text-white font-semibold bg-purple-700 hover:bg-purple-800 transition">Get started</button>
					<button class="w-full sm:w-auto px-6 sm:px-7 py-3 rounded-md font-semibold text-purple-700 bg-white hover:bg-gray-100 transition shadow-sm">Live demo</button>
				</div>
			</div>

			<div class="w-full lg:w-1/2">
				<img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80" alt="Person using phone and laptop" />
			</div>
		</section>
	</main>
</body>
</html>
