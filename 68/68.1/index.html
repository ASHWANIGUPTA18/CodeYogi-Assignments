<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e6ebff;
      background-color: #1f3cb4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background:
        radial-gradient(38% 42% at 12% 14%, #274dd6 0%, transparent 60%),
        radial-gradient(30% 32% at 15% 80%, #264ac8 0%, transparent 60%),
        radial-gradient(28% 30% at 88% 24%, #1f3fb7 0%, transparent 60%),
        radial-gradient(120% 140% at 60% 60%, #1e3aa8 0%, #1a3a9b 40%, #1b38a1 80%);
    }
    .card {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      color: #eef2ff;
      text-align: center;
    }
    .icon-cart { color: #eef2ff; }
    .title { margin: 0; font-size: 26px; font-weight: 600; letter-spacing: 0.2px; }
    .form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .input {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.4px solid rgba(255, 255, 255, 0.6);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: #eef2ff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .input:focus-within {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    .input input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
      font-size: 14px;
      letter-spacing: 0.2px;
    }
    .input input::placeholder { color: rgba(230, 235, 255, 0.9); }
    .button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #1f3cb4;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 16px 32px rgba(0, 0, 0, 0.24); }
    .link-row { display: flex; justify-content: center; gap: 16px; font-size: 14px; }
    .link { color: #e6ebff; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 4px 0; }
    .link:hover { color: #ffffff; }
    .icon { color: #eef2ff; flex-shrink: 0; }
    svg { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon-cart" viewBox="0 0 72 60" width="72" height="60" fill="none" stroke="currentColor" stroke-width="3" aria-hidden>
      <path d="M6 6h13.2a3 3 0 0 1 2.9 2.2l9 30.1a2 2 0 0 0 1.9 1.4h11.6a2 2 0 0 0 1.9-1.4l6.6-22.7a2 2 0 0 1 1.9-1.4h5.2" />
      <circle cx="33" cy="52" r="3" />
      <circle cx="50" cy="52" r="3" />
      <path d="M42 30V14" />
      <path d="M36 20l6-6 6 6" />
    </svg>

    <form class="form" onsubmit="event.preventDefault();">
      <label class="input" for="username">
        <svg class="icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden>
          <circle cx="12" cy="7" r="4" />
          <path d="M5 21c0-3.9 2.7-6 7-6s7 2.1 7 6" />
        </svg>
        <input id="username" name="username" type="text" placeholder="USERNAME" />
      </label>

      <label class="input" for="password">
        <svg class="icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden>
          <rect x="5" y="10" width="14" height="10" rx="2" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <input id="password" name="password" type="password" placeholder="PASSWORD" />
      </label>

      <button class="button" type="submit">LOGIN</button>
    </form>

    <div class="link-row">
      <button class="link" type="button">Forgot password?</button>
    </div>
  </div>
</body>
</html>
